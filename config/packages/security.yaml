security:
    password_hashers:
        App\Entity\User:
            algorithm: auto        

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js|assets|build)/
            security: false

        login:
            pattern: ^/api/login
            stateless: true
            json_login:
                check_path: /api/login
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            jwt: ~

    access_control:
        - { path: ^/api, roles: PUBLIC_ACCESS, methods: [OPTIONS] }
        - { path: ^/api/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/users/register, roles: PUBLIC_ACCESS, methods: [POST] }
        # Admin/Technical endpoints (only ROLE_ADMIN)
        - { path: ^/api/users, roles: ROLE_ADMIN }
        - { path: ^/api/dentists, roles: ROLE_ADMIN }
        - { path: ^/api/boxes, roles: ROLE_ADMIN }
        # Patients: AUXILIAR (CRUD), DENTIST (read-only), ADMIN (all)
        - { path: ^/api/patients, roles: [ROLE_AUXILIAR, ROLE_DENTIST, ROLE_ADMIN] }
        # Appointments: AUXILIAR (CRUD), DENTIST (read-only), ADMIN (all)
        - { path: ^/api/appointments, roles: [ROLE_AUXILIAR, ROLE_DENTIST, ROLE_ADMIN] }
        # Odontograms: DENTIST (CRUD), AUXILIAR (read-only), ADMIN (all)
        - { path: ^/api/odontograms, roles: [ROLE_DENTIST, ROLE_AUXILIAR, ROLE_ADMIN] }
        # Documents: AUXILIAR (CRUD), DENTIST (CRUD), ADMIN (all)
        - { path: ^/api/documents, roles: [ROLE_AUXILIAR, ROLE_DENTIST, ROLE_ADMIN] }
        # Generic protection
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }