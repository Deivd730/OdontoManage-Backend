vich_uploader:
    db_driver: orm
    mappings:
        profile_images:
            uri_prefix: /images/profiles
            upload_destination: '%kernel.project_dir%/public/images/profiles'
            namer: App\Service\Upload\PatientProfileImageNamer

        patient_documents:
            uri_prefix: /documents
            upload_destination: '%kernel.project_dir%/public/documents'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
