name: Publish Backend Image to GHCR

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker tag to publish (example: v1.0.0)"
        required: true
        default: "latest"
      also_latest:
        description: "Also publish latest tag"
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/odontomanage-backend
          tags: |
            type=raw,value=${{ inputs.image_tag }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Tag latest (optional)
        if: ${{ inputs.also_latest && inputs.image_tag != 'latest' }}
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository_owner }}/odontomanage-backend:latest \
            ghcr.io/${{ github.repository_owner }}/odontomanage-backend:${{ inputs.image_tag }}
